<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Stok Takip Sistemi</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0b8ee8,#7ed6ff);
}

/* LOGIN /
.login{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
}

.login-box{
width:600px;
background:#f4f7fb;
border-radius:8px;
box-shadow:0 0 30px #0006;
overflow:hidden;
}

.login-title{
background:linear-gradient(#2b79bd,#14518a);
color:white;
padding:12px;
font-size:20px;
}

.login-body{
padding:30px;
}

.login-body input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #aab7c5;
}

button{
border:1px solid #888;
background:linear-gradient(#fff,#dcdcdc);
padding:8px 14px;
cursor:pointer;
}

button:hover{
background:linear-gradient(#eaf4ff,#c7dff8);
}

/ APP /
.app{
display:none;
}

.topbar{
height:35px;
background:linear-gradient(#2b79bd,#14518a);
color:white;
padding:8px;
}

.toolbar{
background:linear-gradient(#fff,#dce8f5);
padding:10px;
display:flex;
gap:10px;
border-bottom:1px solid #aac2da;
}

.layout{
display:flex;
height:calc(100vh - 80px);
}

/ SIDEBAR /
.sidebar{
width:200px;
background:#eaf2fb;
border-right:1px solid #b7cce2;
padding:10px;
}

.menu-item{
padding:8px;
cursor:pointer;
}

.menu-item:hover{
background:#dbe9f7;
}

/ CONTENT /
.content{
flex:1;
padding:15px;
overflow:auto;
}

.search{
margin-bottom:10px;
}

.search input{
padding:8px;
width:60%;
}

/ TABLE */
table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:linear-gradient(#f8fbff,#d7e7f7);
padding:8px;
border:1px solid #c9d6e3;
}

td{
border:1px solid #ddd;
padding:7px;
text-align:center;
}

tr:hover{
background:#eef6ff;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
<div class="login-box">
<div class="login-title">🔐 Stok Takip Sistemi</div>
<div class="login-body">
<input id="user" placeholder="Kullanıcı Adı" value="admin">
<input id="pass" type="password" value="1234">
<button onclick="login()">Giriş Yap</button>
</div>
</div>
</div>

<!-- APP -->
<div class="app" id="app">

<div class="topbar">📦 Stok Takip Sistemi - Admin Panel</div>

<div class="toolbar">
<button onclick="add()">➕ Yeni Ürün</button>
<button onclick="render()">🔄 Yenile</button>
</div>

<div class="layout">

<div class="sidebar">
<div class="menu-item">📦 Ürünler</div>
<div class="menu-item">📁 Kategoriler</div>
<div class="menu-item">📊 Raporlar</div>
</div>

<div class="content">

<div class="search">
<input id="search" placeholder="Ara..." oninput="render()">
</div>

<table>
<thead>
<tr>
<th>Ürün</th>
<th>Barkod</th>
<th>Adet</th>
<th>Sil</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>

</div>
</div>
</div>

<script>
let products = JSON.parse(localStorage.getItem("stok")||"[]");

function login(){
if(user.value=="admin" && pass.value=="1234"){
login.style.display="none";
app.style.display="block";
render();
}else{
alert("Hatalı giriş");
}
}

function barcode(){
return "869"+Math.floor(10000000+Math.random()*90000000);
}

function add(){
let name = prompt("Ürün adı:");
if(!name) return;

products.push({
name:name,
barcode:barcode(),
qty:1
});

save();
render();
}

function del(i){
products.splice(i,1);
save();
render();
}

function save(){
localStorage.setItem("stok",JSON.stringify(products));
}

function render(){
let q = search.value.toLowerCase();
list.innerHTML="";
products
.filter(p=>p.name.toLowerCase().includes(q))
.forEach((p,i)=>{
list.innerHTML += <tr> <td>${p.name}</td> <td>${p.barcode}</td> <td>${p.qty}</td> <td><button onclick="del(${i})">❌</button></td> </tr>;
});
}
</script>

</body>
</html>
