<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Stok Takip Sistemi</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0b8ee8,#7ed6ff);
}

.login{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
}

.box{
width:500px;
background:#f5f5f5;
border-radius:10px;
box-shadow:0 0 20px #0005;
}

.title{
background:#2b79bd;
color:white;
padding:10px;
font-size:20px;
}

.content{
padding:30px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #aaa;
}

button{
padding:10px;
margin-top:10px;
cursor:pointer;
}

.app{
display:none;
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

td,th{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

</style>
</head>

<body>

<div class="login" id="login">
<div class="box">
<div class="title">🔐 Giriş</div>
<div class="content">
<input id="user" placeholder="Kullanıcı Adı" value="admin">
<input id="pass" type="password" value="1234">
<button onclick="login()">Giriş Yap</button>
</div>
</div>
</div>

<div class="app" id="app">

<h2>📦 Stok Takip Sistemi</h2>

<button onclick="add()">Yeni Ürün</button>

<table>
<thead>
<tr>
<th>Ürün</th>
<th>Barkod</th>
<th>Adet</th>
<th>Sil</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>

</div>

<script>

let products = JSON.parse(localStorage.getItem("stok")||"[]");

function login(){
if(user.value=="admin" && pass.value=="1234"){
login.style.display="none";
app.style.display="block";
render();
}else{
alert("Hatalı giriş");
}
}

function barcode(){
return "869"+Math.floor(10000000+Math.random()*90000000);
}

function add(){
let name = prompt("Ürün adı:");
if(!name) return;

products.push({
name:name,
barcode:barcode(),
qty:1
});

save();
render();
}

function del(i){
products.splice(i,1);
save();
render();
}

function save(){
localStorage.setItem("stok",JSON.stringify(products));
}

function render(){
list.innerHTML="";
products.forEach((p,i)=>{
list.innerHTML += <tr> <td>${p.name}</td> <td>${p.barcode}</td> <td>${p.qty}</td> <td><button onclick="del(${i})">❌</button></td> </tr>;
});
}

</script>

</body>
</html>
